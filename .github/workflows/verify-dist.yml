name: Verify dists are up to date
description: >
  Verify that the checked-in `dist/` of every bundled JS action is up to date with its source.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: check-dist-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Discover every directory whose package.json defines a `bundle` script, so
  # each bundled action is verified individually and new ones are picked up
  # automatically without editing this workflow.
  discover-actions:
    name: Discover actions
    runs-on: ubuntu-arm64
    outputs:
      dirs: ${{ steps.find.outputs.dirs }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Find actions with a bundle script
        id: find
        run: |
          dirs=$(find . -name package.json -not -path '*/node_modules/*' -print0 \
            | xargs -0 -I{} sh -c 'jq -e ".scripts.bundle" "{}" >/dev/null 2>&1 && dirname "{}"' \
            | sed 's|^\./||' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Bundled actions found: $dirs"
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

  verify-dist:
    name: Verify dist
    needs:
      - discover-actions
    if: needs.discover-actions.outputs.dirs != '[]'
    runs-on: ubuntu-arm64
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJSON(needs.discover-actions.outputs.dirs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ matrix.dir }}/.nvmrc
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm ci

      - name: Rebuild dist
        working-directory: ${{ matrix.dir }}
        run: npm run bundle

      - name: Check diff
        run: |
          if [ -n "$(git status --porcelain -- "${COMPONENT_DIR}")" ]; then
            git diff -- "${COMPONENT_DIR}"
            echo ""
            echo "================================================================"
            echo "'${COMPONENT_DIR}/dist' is out of date with its source."
            echo ""
            echo "To regenerate it, from '${COMPONENT_DIR}':"
            echo "  nvm use            # match the Node version in .nvmrc"
            echo "  npm ci             # install EXACT locked versions (never 'npm install')"
            echo "  npm run bundle     # rebuild dist/"
            echo "Then commit the updated dist/ together with your change."
            echo ""
            echo "The bundle is produced by 'ncc', which inlines every dependency and"
            echo "minifies the result, so the output drifts unless the Node version, the"
            echo "bundler, and every inlined dependency are pinned identically everywhere."
            echo "If you are setting up a NEW bundled action, make sure it has:"
            echo "  - a .nvmrc pinning an exact Node version (e.g. 24.11.0)"
            echo "  - exact (caret-free) versions for the inlined runtime deps and @vercel/ncc"
            echo "    in package.json (e.g. \"@actions/core\": \"3.0.1\", not \"^3.0.1\")"
            echo "  - a committed package-lock.json, always installed with 'npm ci'"
            echo "  - a 'bundle' script in package.json that writes to dist/"
            echo "================================================================"
            echo "::error::'${COMPONENT_DIR}/dist' is out of date. From '${COMPONENT_DIR}' run 'nvm use && npm ci && npm run bundle' and commit dist/. See the log above for setting up a new bundled action."
            exit 1
          fi
          echo "'${COMPONENT_DIR}' dist is up to date."
        env:
          COMPONENT_DIR: ${{ matrix.dir }}
