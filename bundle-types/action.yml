name: "Grafana Bundle Types"
description: "Bundles a Grafana plugins types and pushes them to npm."

outputs:
  typesFilePath:
    description: "The path to the built types file."
    value: ${{ steps.set-outputs.outputs.typesFilePath }}

inputs:
  entryPoint:
    description: "Location of types file to bundle."
    required: false
    default: "./src/types/index.ts"
  tsConfig:
    description: "A path to the tsconfig file to use when bundling types."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "${{ inputs.node-version }}"

    - name: Install dependencies
      run: ${{ github.action_path }}/pm.sh install
      shell: bash

    - name: Get plugin id
      id: get-plugin-id
      run: |
        PLUGIN_ID=$(cat src/plugin.json | jq -r .id)
        echo "plugin-id=${PLUGIN_ID}" >> $GITHUB_OUTPUT
      shell: bash

    - id: get-secrets
      uses: grafana/shared-workflows/actions/get-vault-secrets@main
      with:
        common_secrets: |
          GITHUB_APP_ID=plugins-platform-bot-app:app-id
          GITHUB_APP_PRIVATE_KEY=plugins-platform-bot-app:private-key

    - name: Generate token
      id: generate-token
      uses: tibdex/github-app-token@v2
      with:
        app_id: ${{ env.GITHUB_APP_ID }}
        private_key: ${{ env.GITHUB_APP_PRIVATE_KEY }}

    - name: Clone NPM types package repo
      run: |
        cd ..
        gh auth status
        gh repo clone grafana/plugin-extension-types
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

    - name: Bundle types
      run: npx -y @grafana/plugin-types-bundler@latest --entry-point ${{ inputs.entryPoint }} --out-dir="../plugin-extension-types/${{ steps.get-plugin-id.outputs.plugin-id }}"
      shell: bash

    - name: Check diff for changes
      id: check-diff
      run: |
        cd ../plugin-extension-types
        if git diff --quiet; then
          echo "No changes found"
          echo "has-changes=false" >> $GITHUB_OUTPUT
        else
          echo "Changes to ${{ inputs.entryPoint }} detected..."
          echo "has-changes=true" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Create branch
      if: ${{ steps.check-diff.outputs.has-changes == 'true' }}
      run: |
        cd ../plugin-extension-types
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b ${{ steps.metadata.outputs.plugin-id }}-${{ github.sha }}
        git add .
        git commit -m "types: updating ${{ steps.metadata.outputs.plugin-id }}"
        git push https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/grafana/plugin-extension-types test-branch
      shell: bash

