name: "Grafana Create Plugin Update"
description: "Runs create-plugin update within a Grafana plugin and opens a PR with the changes"

inputs:
  token:
    description: "Token for the repository. Can be passed in using `{{ secrets.GITHUB_TOKEN }}`."
    required: true
  base:
    description: "Sets the pull request base branch"
    required: false
    default: "main"
  node-version:
    description: "Version of node"
    required: false
    default: "20"

runs:
  using: "composite"
  steps:
    - name: Checkout Repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
        ref: ${{ inputs.base }}

    - name: Detect package manager
      id: package-manager
      uses: grafana/plugin-actions/package-manager-detect@package-manager-detect/v1.0.1

    - name: Install pnpm
      if: steps.package-manager.outputs.name == 'pnpm'
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        version: ${{ steps.package-manager.outputs.version }}

    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: "${{ inputs.node-version }}"
        cache: ${{ steps.package-manager.outputs.name }}
        cache-dependency-path: ${{ steps.package-manager.outputs.lockFilePath }}

    - name: Get latest version of create-plugin package
      id: get-latest-version
      run: |
        echo "latest_version=$(npx -y @grafana/create-plugin@latest version | sed 's/.*@//' | sed 's/ *$//' | sed '/^$/d')" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Get version from .config/.cprc.json
      id: get-config-version
      run: |
        echo "config_version=$(jq -r '.version' .config/.cprc.json)" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Compare versions
      id: compare-versions
      run: |
        if [ "$LATEST_VERSION" != "$CONFIG_VERSION" ]; then
          echo "update_needed=true" >> "$GITHUB_OUTPUT"
        else
          echo "update_needed=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
      env:
        LATEST_VERSION: ${{ steps.get-latest-version.outputs.latest_version }}
        CONFIG_VERSION: ${{ steps.get-config-version.outputs.config_version }}

    - name: Exit if version is already up to date
      if: steps.compare-versions.outputs.update_needed == 'false'
      run: echo "::notice::Plugin is already using the latest create-plugin version. No update needed."
      shell: bash

    - name: Install dependencies
      if: steps.compare-versions.outputs.update_needed == 'true'
      run: ${{ steps.package-manager.outputs.frozenInstallCmd }}
      shell: bash

    - name: Update the configs
      if: steps.compare-versions.outputs.update_needed == 'true'
      run: |
        ${{ steps.package-manager.outputs.execCmd }} @grafana/create-plugin update
      shell: bash

    # check if the update command produced any file changes,
    # if not we can skip the commit and PR creation
    - name: Check branch status
      id: check-changes
      if: steps.compare-versions.outputs.update_needed == 'true'
      run: |
        if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
          echo "should_push=true" >> "$GITHUB_OUTPUT"
        else
          echo "should_push=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Exit if no update is needed
      if: steps.compare-versions.outputs.update_needed == 'true' && steps.check-changes.outputs.should_push == 'false'
      run: echo "::notice::create-plugin update produced no file changes (only a version bump in .cprc.json). Skipping branch push."
      shell: bash

    - name: Create branch and commit via API
      if: steps.compare-versions.outputs.update_needed == 'true' && steps.check-changes.outputs.should_push == 'true'
      run: |
        BRANCH_NAME="update-grafana-create-plugin-${LATEST_VERSION}"
        HEAD_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/branches/${BASE}" --jq '.commit.sha')

        if gh api "repos/${GITHUB_REPOSITORY}/branches/${BRANCH_NAME}" > /dev/null 2>&1; then
          HEAD_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/branches/${BRANCH_NAME}" --jq '.commit.sha')
        else
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            -X POST \
            -f "ref=refs/heads/${BRANCH_NAME}" \
            -f "sha=${HEAD_SHA}"
        fi

        ADDITIONS_FILE=$(mktemp)
        DELETIONS_FILE=$(mktemp)
        echo "[]" > "$ADDITIONS_FILE"
        echo "[]" > "$DELETIONS_FILE"

        while IFS= read -r line; do
          STATUS="${line:0:2}"
          FILE="${line:3}"
          if [[ "$STATUS" == "??" || "$STATUS" =~ ^.M$ || "$STATUS" =~ ^M.$ ]]; then
            CONTENTS_FILE=$(mktemp)
            base64 -w 0 "$FILE" > "$CONTENTS_FILE"
            jq --arg path "$FILE" --rawfile contents "$CONTENTS_FILE" '. + [{path: $path, contents: $contents}]' "$ADDITIONS_FILE" > "${ADDITIONS_FILE}.tmp"
            mv "${ADDITIONS_FILE}.tmp" "$ADDITIONS_FILE"
            rm "$CONTENTS_FILE"
          elif [[ "$STATUS" =~ ^.D$ || "$STATUS" =~ ^D.$ ]]; then
            jq --arg path "$FILE" '. + [{path: $path}]' "$DELETIONS_FILE" > "${DELETIONS_FILE}.tmp"
            mv "${DELETIONS_FILE}.tmp" "$DELETIONS_FILE"
          fi
        done < <(git status --porcelain --untracked-files=all)

        jq -n \
          --arg repo "${GITHUB_REPOSITORY}" \
          --arg branch "$BRANCH_NAME" \
          --arg message "chore: bump @grafana/create-plugin configuration to ${LATEST_VERSION}" \
          --arg headOid "$HEAD_SHA" \
          --slurpfile additions "$ADDITIONS_FILE" \
          --slurpfile deletions "$DELETIONS_FILE" \
          '{
            query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { url } } }",
            variables: {
              input: {
                branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                message: { headline: $message },
                fileChanges: { additions: $additions[0], deletions: $deletions[0] },
                expectedHeadOid: $headOid
              }
            }
          }' | gh api graphql --input -

        rm "$ADDITIONS_FILE" "$DELETIONS_FILE"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        LATEST_VERSION: ${{ steps.get-latest-version.outputs.latest_version }}
        BASE: ${{ inputs.base }}

    - name: Create or Update PR
      if: steps.compare-versions.outputs.update_needed == 'true' && steps.check-changes.outputs.should_push == 'true'
      env:
        GH_TOKEN: ${{ inputs.token }}
        LATEST_VERSION: ${{ steps.get-latest-version.outputs.latest_version }}
        CONFIG_VERSION: ${{ steps.get-config-version.outputs.config_version }}
        BASE: ${{ inputs.base }}
      run: |
        PR_NUMBER=$(gh pr list --base $BASE --head update-grafana-create-plugin-${LATEST_VERSION} --json number -q '.[0].number')

        PR_TITLE="chore: bump @grafana/create-plugin configuration to $LATEST_VERSION"

        PR_BODY=$(cat <<EOF
        Bumps [\`@grafana/create-plugin\`](https://github.com/grafana/plugin-tools/tree/main/packages/create-plugin) configuration from $CONFIG_VERSION to $LATEST_VERSION.

        **Notes for reviewer:**
        This is an auto-generated PR which ran \`@grafana/create-plugin update\`.
        Please consult the create-plugin [CHANGELOG.md](https://github.com/grafana/plugin-tools/blob/main/packages/create-plugin/CHANGELOG.md) to understand what may have changed.
        Please review the changes thoroughly before merging.
        EOF
        )

        if [ -z "$PR_NUMBER" ]; then
          gh pr create --base $BASE --head update-grafana-create-plugin-${LATEST_VERSION} --title "$PR_TITLE" --body "$PR_BODY"
        else
          gh pr edit $PR_NUMBER --title "$PR_TITLE" --body "$PR_BODY"
        fi
      shell: bash
