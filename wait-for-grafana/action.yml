name: "Wait for Grafana"
description: "Wait for a server to respond with a specific status code"
inputs:
  url:
    description: "The URL to check"
    required: true
    default: "http://localhost:3000/"
  responseCode:
    description: "The expected HTTP response code"
    required: true
    default: "200"
  timeout:
    description: "Timeout in seconds"
    required: true
    default: "60"
  interval:
    description: "Interval between checks in seconds"
    required: true
    default: "0.5"
  startupTimeout:
    description: "Seconds to wait for the TCP port to bind before health polling begins. Raise this only if Grafana genuinely takes longer than the default to start — a long default delays diagnosis of startup crashes (e.g. provisioning deadlocks), which never recover no matter how long we wait."
    required: true
    default: "60"
runs:
  using: "composite"
  steps:
    - run: ${{ github.action_path }}/wait-for-grafana.sh "${GRAFANA_URL}" "${GRAFANA_RESPONSE_CODE}" "${GRAFANA_TIMEOUT}" "${GRAFANA_INTERVAL}" "${GRAFANA_STARTUP_TIMEOUT}"
      shell: bash
      env:
        GRAFANA_URL: ${{ inputs.url }}
        GRAFANA_RESPONSE_CODE: ${{ inputs.responseCode }}
        GRAFANA_TIMEOUT: ${{ inputs.timeout }}
        GRAFANA_INTERVAL: ${{ inputs.interval }}
        GRAFANA_STARTUP_TIMEOUT: ${{ inputs.startupTimeout }}
